<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN -->
<section id="login-section">
    <div class="login-card">
        <h1 class="login-title">Todo List</h1>
        <p class="login-subtitle">Inicia sesión para gestionar tus tareas</p>
        <div class="form-group">
            <label for="login-user">Usuario</label>
            <input type="text" id="login-user" placeholder="Tu nombre de usuario">
        </div>
        <div class="form-group">
            <label for="login-pass">Contraseña</label>
            <input type="password" id="login-pass" placeholder="Tu contraseña">
        </div>
        <button id="btn-login" class="btn btn-primary">Entrar</button>
        <div id="login-error" class="error-msg hidden"></div>
        <p class="login-register">¿No tienes cuenta? <a href="#" id="show-register">Regístrate</a></p>
    </div>
</section>

<!-- REGISTRO -->
<section id="register-section" class="hidden">
    <div class="login-card">
        <h1 class="login-title">Registro</h1>
        <p class="login-subtitle">Crea una cuenta nueva</p>
        <div class="form-group">
            <label for="reg-user">Usuario</label>
            <input type="text" id="reg-user" placeholder="Nombre de usuario">
        </div>
        <div class="form-group">
            <label for="reg-email">Email</label>
            <input type="email" id="reg-email" placeholder="tu@email.com">
        </div>
        <div class="form-group">
            <label for="reg-fullname">Nombre completo</label>
            <input type="text" id="reg-fullname" placeholder="Tu nombre completo">
        </div>
        <div class="form-group">
            <label for="reg-pass">Contraseña</label>
            <input type="password" id="reg-pass" placeholder="Tu contraseña">
        </div>
        <button id="btn-register" class="btn btn-primary">Registrarse</button>
        <div id="register-error" class="error-msg hidden"></div>
        <p class="login-register"><a href="#" id="show-login">Volver al login</a></p>
    </div>
</section>

<!-- APP PRINCIPAL -->
<section id="app-section" class="hidden">

    <!-- Header -->
    <header class="app-header">
        <div class="header-left">
            <h1 class="app-logo">Todo List</h1>
        </div>
        <div class="header-right">
            <span id="user-info" class="user-info"></span>
            <button id="btn-logout" class="btn btn-small btn-outline">Cerrar sesión</button>
        </div>
    </header>

    <!-- Barra de acciones -->
    <div class="actions-bar">
        <div class="search-box">
            <input type="text" id="search-title" placeholder="Buscar por título...">
        </div>
        <div class="filters">
            <select id="filter-completed">
                <option value="">Todas</option>
                <option value="false">Pendientes</option>
                <option value="true">Completadas</option>
            </select>
            <select id="filter-priority">
                <option value="">Prioridad</option>
                <option value="LOW">Baja</option>
                <option value="MEDIUM">Media</option>
                <option value="HIGH">Alta</option>
                <option value="URGENT">Urgente</option>
            </select>
            <select id="filter-category">
                <option value="">Categoría</option>
            </select>
        </div>
        <button id="btn-new-task" class="btn btn-primary">+ Nueva tarea</button>
    </div>

    <!-- Dashboard -->
    <div class="dashboard">
        <div class="dash-card">
            <span class="dash-number" id="dash-total">0</span>
            <span class="dash-label">Total</span>
        </div>
        <div class="dash-card dash-pending">
            <span class="dash-number" id="dash-pending">0</span>
            <span class="dash-label">Pendientes</span>
        </div>
        <div class="dash-card dash-completed">
            <span class="dash-number" id="dash-completed">0</span>
            <span class="dash-label">Completadas</span>
        </div>
        <div class="dash-card dash-overdue">
            <span class="dash-number" id="dash-overdue">0</span>
            <span class="dash-label">Vencidas</span>
        </div>
    </div>

    <!-- Lista de tareas -->
    <div id="task-list" class="task-list"></div>

    <!-- Modal crear/editar tarea -->
    <div id="task-modal" class="modal hidden">
        <div class="modal-content">
            <h2 id="modal-title">Nueva tarea</h2>
            <input type="hidden" id="task-id">
            <div class="form-group">
                <label for="task-title">Título</label>
                <input type="text" id="task-title" placeholder="Título de la tarea">
            </div>
            <div class="form-group">
                <label for="task-desc">Descripción</label>
                <textarea id="task-desc" placeholder="Descripción de la tarea" rows="3"></textarea>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="task-deadline">Fecha límite</label>
                    <input type="datetime-local" id="task-deadline">
                </div>
                <div class="form-group">
                    <label for="task-priority">Prioridad</label>
                    <select id="task-priority">
                        <option value="LOW">Baja</option>
                        <option value="MEDIUM" selected>Media</option>
                        <option value="HIGH">Alta</option>
                        <option value="URGENT">Urgente</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label for="task-category">Categoría</label>
                <select id="task-category">
                    <option value="">Sin categoría</option>
                </select>
            </div>
            <div class="modal-actions">
                <button id="btn-save-task" class="btn btn-primary">Guardar</button>
                <button id="btn-cancel-task" class="btn btn-outline">Cancelar</button>
            </div>
        </div>
    </div>

</section>

<script src="app.js"></script>
</body>
</html>
